<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Runner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "leaflet": "https://esm.sh/leaflet@1.9.4",
                "nipplejs": "https://esm.sh/nipplejs@0.10.1"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <div id="map"></div>
        
        <div id="ui-layer">
            <div class="top-bar">
                <div class="stat-box">
                    <span class="label">SCORE</span>
                    <span id="score-display">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">DIST</span>
                    <span id="dist-display">0m</span>
                </div>
            </div>

            <div id="message-area" class="hidden">
                <h2 id="msg-title">Ready?</h2>
                <p id="msg-body">Go to the markers!</p>
            </div>

            <div id="controls-area">
                <button id="start-btn" class="action-btn">START RUN</button>
                <div class="toggle-container">
                    <label class="switch">
                        <input type="checkbox" id="gps-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label">Virtual Joystick (Couch Mode)</span>
                </div>
            </div>

            <div id="joystick-zone" class="hidden"></div>
            
            <button id="recenter-btn" class="icon-btn" aria-label="Recenter">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                    <line x1="12" y1="2" x2="12" y2="6"></line>
                    <line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line>
                    <line x1="18" y1="12" x2="22" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
